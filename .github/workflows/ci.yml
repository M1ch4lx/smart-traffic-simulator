name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smart-traffic-simulator-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Tests
        run: npm test

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smart-traffic-simulator-backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Scala
        uses: coursier/setup-action@v1
        with:
          jvm: temurin:21
      - name: Run Tests
        run: sbt test